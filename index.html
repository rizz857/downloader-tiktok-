<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocioLoad - Premium Video Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background: radial-gradient(circle at top, #1a1f35, #0b0f1a); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            min-height: screen;
        }
        .glass { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255,255,255,0.08); 
        }
        .glow-input { 
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.15); 
            background: #111827;
        }
        .btn-download { 
            background: linear-gradient(90deg, #00d2ff, #3a7bd5); 
            transition: all 0.3s ease;
        }
        .btn-download:hover { 
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.5); 
            transform: translateY(-2px); 
        }
        .video-container {
            position: relative;
            width: 100%;
            max-width: 320px;
            aspect-ratio: 9/16;
            margin: 0 auto;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            border: 4px solid rgba(255,255,255,0.05);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-result { animation: slideUp 0.5s forwards; }
    </style>
</head>
<body class="flex flex-col items-center p-6 md:p-12">

    <header class="w-full max-w-6xl flex justify-between items-center mb-16">
        <div class="flex items-center gap-2">
            <div class="bg-blue-500 p-1.5 rounded-lg">
                <i data-lucide="rocket" class="text-white w-5 h-5 fill-white"></i>
            </div>
            <span class="text-xl font-extrabold tracking-tighter italic">SOCIO<span class="text-blue-400 font-black">LOAD</span></span>
        </div>
        <nav class="hidden md:flex gap-8 text-[11px] font-bold tracking-widest text-slate-400">
            <a href="#" class="text-white border-b-2 border-blue-500 pb-1">HOME</a>
            <a href="#" class="hover:text-white transition">FEATURES</a>
            <a href="#" class="hover:text-white transition">SUPPORT</a>
            <button class="border border-blue-500/50 px-4 py-2 rounded-full text-blue-400 hover:bg-blue-500/10 transition">INSTANT DOWNLOAD</button>
        </nav>
    </header>

    <main class="w-full max-w-4xl flex flex-col items-center">
        <h1 class="text-3xl md:text-5xl font-black text-center mb-4 tracking-tight">
            SOCIO LOAD - <span class="text-blue-400">All-in-One</span>
        </h1>
        <p class="text-slate-400 text-center mb-10 text-sm md:text-base font-medium">
            Mendukung TikTok No Watermark, Instagram, YouTube, dan 50+ Platform lainnya.
        </p>
        
        <div class="w-full max-w-2xl flex flex-col items-center gap-4">
            <div class="relative w-full">
                <input type="text" id="urlInput" placeholder="Tempel link video TikTok di sini..." 
                       class="w-full glow-input border border-blue-500/20 p-5 rounded-2xl outline-none text-sm font-medium transition focus:border-blue-500/60">
                <i data-lucide="link" class="absolute right-6 top-5 text-slate-500 w-5 h-5"></i>
            </div>

            <button onclick="processLink()" id="btnAction" class="btn-download w-full md:w-auto px-12 py-4 rounded-2xl font-black text-sm tracking-widest flex items-center justify-center gap-3">
                DOWNLOAD <i data-lucide="arrow-right" class="w-4 h-4"></i>
            </button>
        </div>

        <div id="loader" class="hidden mt-12 flex flex-col items-center">
            <div class="w-10 h-10 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin"></div>
            <p class="text-xs mt-4 text-blue-400 font-bold uppercase tracking-widest">Searching Video...</p>
        </div>

        <div id="resultCard" class="hidden mt-12 w-full max-w-lg glass p-6 rounded-[2.5rem] animate-result shadow-2xl">
            <div class="video-container mb-6">
                <video id="player" controls class="w-full h-full object-cover">
                    <source src="" type="video/mp4">
                </video>
            </div>
            
            <div class="space-y-3">
                <button id="directDownload" class="w-full bg-green-500 hover:bg-green-600 text-white py-4 rounded-2xl font-black text-sm transition flex items-center justify-center gap-2">
                    <i data-lucide="download" class="w-5 h-5"></i> SIMPAN KE GALERI
                </button>
                <button onclick="location.reload()" class="w-full text-slate-500 text-[11px] font-bold uppercase tracking-widest hover:text-white transition">
                    Batal & Reset
                </button>
            </div>
        </div>

        <div id="badges" class="grid grid-cols-5 gap-6 mt-20 opacity-30">
            <i data-lucide="instagram" class="w-6 h-6"></i>
            <i data-lucide="music-2" class="w-6 h-6 text-blue-400"></i>
            <i data-lucide="youtube" class="w-6 h-6"></i>
            <i data-lucide="facebook" class="w-6 h-6"></i>
            <i data-lucide="twitter" class="w-6 h-6"></i>
        </div>
    </main>

    <script>
        lucide.createIcons();

        async function processLink() {
            const url = document.getElementById('urlInput').value;
            const btn = document.getElementById('btnAction');
            const loader = document.getElementById('loader');
            const resultCard = document.getElementById('resultCard');
            const player = document.getElementById('player');
            const dlBtn = document.getElementById('directDownload');
            const badges = document.getElementById('badges');

            if(!url) return alert("Masukkan link TikTok dulu!");

            // UI State
            btn.disabled = true;
            btn.style.opacity = "0.5";
            loader.classList.remove('hidden');
            resultCard.classList.add('hidden');
            badges.classList.add('hidden');

            try {
                // Fetch data dari API
                const res = await fetch('https://tiktok-downloader-download-tiktok-videos-without-watermark.p.rapidapi.com/rich_response/index?url=' + encodeURIComponent(url), {
                    method: 'GET',
                    headers: {
                        'x-rapidapi-host': 'tiktok-downloader-download-tiktok-videos-without-watermark.p.rapidapi.com',
                        'x-rapidapi-key': 'beb0b5cde4mshd5ce08b86803a3fp170b87jsn290676d8be16'
                    }
                });
                
                const data = await res.json();
                const videoUrl = data.data?.[0] || (data.video && data.video[0]);

                if(videoUrl) {
                    // Set Video Player
                    player.src = videoUrl;
                    player.load();
                    
                    // Logic Direct Download (Blob)
                    dlBtn.onclick = async () => {
                        const originalText = dlBtn.innerHTML;
                        dlBtn.innerHTML = `<div class="w-5 h-5 border-2 border-white/20 border-t-white rounded-full animate-spin"></div> MENGUNDUH...`;
                        dlBtn.disabled = true;

                        try {
                            const vRes = await fetch(videoUrl);
                            const blob = await vRes.blob();
                            const blobUrl = window.URL.createObjectURL(blob);
                            
                            const link = document.createElement('a');
                            link.href = blobUrl;
                            link.download = `SocioLoad_${Date.now()}.mp4`;
                            document.body.appendChild(link);
                            link.click();
                            document.body.removeChild(link);
                            window.URL.revokeObjectURL(blobUrl);
                            
                            dlBtn.innerHTML = `<i data-lucide="check" class="w-5 h-5"></i> BERHASIL!`;
                            dlBtn.classList.replace('bg-green-500', 'bg-blue-500');
                        } catch (err) {
                            // Fallback jika Blob gagal
                            window.open(videoUrl, '_blank');
                            dlBtn.innerHTML = originalText;
                        } finally {
                            dlBtn.disabled = false;
                            lucide.createIcons();
                        }
                    };

                    loader.classList.add('hidden');
                    resultCard.classList.remove('hidden');
                } else {
                    alert("Video tidak ditemukan. Pastikan link publik!");
                }
            } catch (e) {
                alert("Gagal menghubungi server API.");
            } finally {
                btn.disabled = false;
                btn.style.opacity = "1";
                loader.classList.add('hidden');
                lucide.createIcons();
            }
        }
    </script>
</body>
  </html>
